name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build server
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o dist/bwpanel-${{ matrix.goos }}-${{ matrix.goarch }} ./server

      - name: Build client
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o dist/bwagent-${{ matrix.goos }}-${{ matrix.goarch }} ./client

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bwpanel-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/bwagent-${{ matrix.goos }}-${{ matrix.goarch }}
